<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special Surprise ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      min-height: 100vh;
      text-align: center;
      color: white;
    }

    h1 {
      padding-top: 20px;
      font-size: 36px;
    }

    p {
      font-size: 18px;
    }

    #puzzle-container {
      width: 300px;
      height: 300px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .piece {
      width: 100px;
      height: 100px;
      border: 1px solid white;
      background-image: url('yourphoto.jpg');
      background-size: 300px 300px;
      cursor: grab;
    }

    #message {
      display: none;
      background: white;
      color: black;
      width: 85%;
      max-width: 450px;
      margin: 30px auto;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .final-image {
      width: 220px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    button {
      margin-top: 15px;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: #ff4b6e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #message {
      display: none;
      opacity: 0;
      transition: opacity 2s ease;
    }

    #message.show {
      display: block;
      opacity: 1;
    }

#confetti {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
  </style>
</head>
<body>

  <h1>Complete The Puzzle ❤️</h1>

  <p>Drag and drop the pieces to reveal your surprise 😌</p>

  <div id="puzzle-container"></div>

  <div id="message">
    <img src="yourphoto.jpg" class="final-image">

    <h2>You Solved It ❤️</h2>

    <p>
      Thank you for being such an amazing part of my life ✨
      <br><br>
      Every moment with you feels special.
      <br><br>
      This little puzzle was just a reminder that you mean a lot to me 💖
    </p>

    <button onclick="alert('Now go smile 😌❤️')">
      One More Smile
    </button>
  </div>
  
  <audio id="bgMusic">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <canvas id="confetti"></canvas>

  <script>
const music = document.getElementById('bgMusic');

const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
    
const container = document.getElementById('puzzle-container');
const message = document.getElementById('message');

const positions = [
  '0px 0px',
  '-100px 0px',
  '-200px 0px',
  '0px -100px',
  '-100px -100px',
  '-200px -100px',
  '0px -200px',
  '-100px -200px',
  '-200px -200px'
];

let shuffled = [...positions].sort(() => Math.random() - 0.5);

let selectedPiece = null;

function renderPuzzle() {
  container.innerHTML = '';

  shuffled.forEach((pos, index) => {
    const piece = document.createElement('div');

    piece.className = 'piece';
    piece.style.backgroundPosition = pos;

    piece.addEventListener('click', () => selectPiece(index));

    if (selectedPiece === index) {
      piece.style.border = '3px solid yellow';
    }

    container.appendChild(piece);
  });
}

function selectPiece(index) {

  if (selectedPiece === null) {
    selectedPiece = index;
  } else {

    [shuffled[selectedPiece], shuffled[index]] =
    [shuffled[index], shuffled[selectedPiece]];

    selectedPiece = null;

    checkWin();
  }

  renderPuzzle();
}

function checkWin() {

  let win = true;

  for(let i=0;i<positions.length;i++){

    if(positions[i]!==shuffled[i]){

      win=false;

      break;

    }

  }

  if(win){

    container.style.display='none';

    music.play();

    startConfetti();

    message.style.display='block';

    setTimeout(()=>{

      message.classList.add('show');

    },100);

  }

}

const confetti = [];

for(let i=0;i<150;i++) {

  confetti.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height - canvas.height,
    r: Math.random()*6+2,
    dx: Math.random()*4-2,
    dy: Math.random()*4+2,
    color:`hsl(${Math.random()*360},100%,50%)`
  });

}

function startConfetti() {

  function animate() {

    ctx.clearRect(0,0,canvas.width,canvas.height);

    confetti.forEach(c=>{

      c.x += c.dx;
      c.y += c.dy;

      if(c.y>canvas.height){

        c.y=-10;
        c.x=Math.random()*canvas.width;

      }

      ctx.beginPath();

      ctx.arc(c.x,c.y,c.r,0,Math.PI*2);

      ctx.fillStyle=c.color;

      ctx.fill();

    });

    requestAnimationFrame(animate);

  }

  animate();

}
    
renderPuzzle();
</script>

</body>
</html>
